version: 1
mode: dependency-driven
tier: deep
max_parallel: 3
timeout_per_task: 300

stages:
  - name: "Core routing engine"
    tasks:
      - id: task-1
        title: "Config types and YAML parser"
        files: [core/intercore/internal/routing/routing.go, core/intercore/internal/routing/config.go, core/intercore/internal/routing/config_test.go]
        depends: []
      - id: task-2
        title: "Routing resolver with safety floors"
        files: [core/intercore/internal/routing/resolve.go, core/intercore/internal/routing/resolve_test.go]
        depends: [task-1]
      - id: task-3
        title: "Cost table and cheapest-capable ranking"
        files: [core/intercore/internal/routing/costs.go, core/intercore/internal/routing/costs_test.go]
        depends: [task-1]

  - name: "CLI and config"
    tasks:
      - id: task-4
        title: "ic route CLI command"
        files: [core/intercore/cmd/ic/route.go, core/intercore/cmd/ic/main.go]
        depends: [task-2, task-3]
      - id: task-5
        title: "Create costs.yaml with model pricing"
        files: [core/intercore/config/costs.yaml]
        depends: []
        tier: fast

  - name: "Migration and cleanup"
    tasks:
      - id: task-6
        title: "Wire lib-routing.sh to ic route (strangler-fig)"
        files: [os/clavain/scripts/lib-routing.sh]
        depends: [task-4]
      - id: task-7
        title: "Disable interserve plugin"
        files: [interverse/interserve/DEPRECATED.md]
        depends: []
        tier: fast
      - id: task-8
        title: "Build, install, and smoke test"
        files: [core/intercore/cmd/ic/]
        depends: [task-6]
